<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium air purification engineered for silence. Electrostatic precision, zero compromise." />
  <title>Muted Aero One — Premium Air Purifier</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER / NAVIGATION -->
  <header class="header" id="header">
    <div class="container">
      <div class="header-content">
        <a href="#hero" class="logo" aria-label="Muted Aero One Home">
          <img src="logo.png" alt="Muted" width="508" height="160" />
        </a>

      </div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero" id="hero">
    <div class="hero-background">
      <img src="hero.jpeg" alt="Muted Aero One air purifier" width="1024" height="1024" />
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-badge">Coming Soon</p>
      <h1 class="hero-headline">
        <span class="hero-brand">Muted Aero One</span>
        <span class="hero-subline">The  next  evolution  in  indoor  air  purification</span>
      </h1>
      <p class="hero-tagline">Powered by Electro Settling Technology.</p>
      <div class="hero-cta-group">
        <a href="#contact" class="btn btn-primary">Contact us</a>
      </div>
    </div>
  </section>


  <!-- CONTACT / CTA SECTION -->
  <section class="section contact-section" id=" ">
    <button class="contact-close" id="contact-close" aria-label="Close contact page">✕</button>
    <div class="container">
      <div class="contact-content">
        <h2 class="section-heading"></h2>
        <p class="section-text">Interested in Muted Aero One? Let's talk.</p>
        
        <div class="contact-box">
          <div class="contact-item">
            <span class="contact-label">Email</span>
            <a href="mailto:info@muted.com" class="contact-value">info@muted.com</a>
          </div>
          <div class="contact-item">
            <span class="contact-label">Phone</span>
            <a href="tel:+1234567890" class="contact-value">+1 (234) 567-8900</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="public/logo.png" alt="Muted" class="footer-logo" width="508" height="160" />
      </div>

      <nav class="footer-nav">
        <a href="#contact" class="footer-nav-link">Contact</a>
      </nav>
    </div>

    <div class="footer-bottom">
      <p>&copy; 2025 MUTED Technologies. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
